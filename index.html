<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北市旅館業緊急意外事故處理通報表 v6.0.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --gov-dark-blue: #1a365d;   
            --gov-orange: #e65100;      
            --text-main: #2d3748;       
        }
        body { 
            background-color: #f7fafc; 
            font-family: 'Noto Sans TC', "Microsoft JhengHei", sans-serif; 
            color: var(--text-main);
            padding: 20px 0; 
        }
        @media (min-width: 768px) { body { padding: 40px 0; } }
        .card { 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border: 1px solid rgba(26, 54, 93, 0.08);
            background-color: #ffffff;
        }
        .card-header { 
            background: linear-gradient(135deg, var(--gov-dark-blue), #2b6cb0); 
            color: white; padding: 24px 20px; border-bottom: none;
        }
        .section-title {
            color: var(--gov-dark-blue); font-weight: 700; border-left: 5px solid var(--gov-orange);
            padding-left: 12px; margin-top: 25px; margin-bottom: 20px; font-size: 18px;
        }
        .form-label { font-weight: 500; color: #4a5568; font-size: 15px; }
        .required::after { content: " *"; color: #e53e3e; font-weight: bold; }
        .form-control, .form-select { border-radius: 8px; border: 1px solid #cbd5e0; padding: 10px 14px; font-size: 15px; }
        .time-locker-anchor {
            display: block; text-align: center; background-color: #edf2f7; color: #2b6cb0;
            border: 1px dashed #4299e1; padding: 10px; border-radius: 8px;
            font-weight: bold; font-size: 15px; text-decoration: none; cursor: pointer; transition: all 0.15s;
        }
        .time-locker-anchor:hover { background-color: #4299e1; color: white; border-style: solid; }
        .btn-submit {
            background: linear-gradient(135deg, #dd6b20, var(--gov-orange)); color: white;
            border: none; border-radius: 8px; padding: 14px 40px; font-weight: 700;
            box-shadow: 0 4px 12px rgba(230, 81, 0, 0.2); cursor: pointer; transition: all 0.2s;
        }
        .btn-submit:hover { background: linear-gradient(135deg, var(--gov-orange), #c05621); }
        .gov-footer { background-color: #2d3748; color: #a0aec0; padding: 24px 0; font-size: 13px; margin-top: 60px; border-top: 4px solid var(--gov-orange); }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card">
                <div class="card-header text-center">
                    <h3 class="mb-1 fw-bold">臺北市旅館業緊急意外事故處理通報表</h3>
                    <small>臺北市政府觀光傳播局</small>
                </div>
                <div class="card-body p-4 px-md-5">
                    <form id="reportForm">
                        
                        <div class="section-title">一、填報單位</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label required">【1】填報單位</label>
                                <input type="text" class="form-control" id="hotelName" placeholder="請輸入完整旅館名稱" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label required">【2】所屬行政區</label>
                                <select class="form-select" id="district" required>
                                    <option value="">-- 請選擇專責行政區 --</option>
                                    <option value="中正區">中正區</option>
                                    <option value="信義區">信義區</option>
                                    <option value="大安區">大安區</option>
                                    <option value="北投區">北投區</option>
                                    <option value="大同區">大同區</option>
                                    <option value="萬華區">萬華區</option>
                                    <option value="中山區">中山區</option>
                                    <option value="松山區">松山區</option>
                                    <option value="南港區">南港區</option>
                                    <option value="內湖區">內湖區</option>
                                    <option value="文山區">文山區</option>
                                    <option value="士林區">士林區</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label required">【3】通報人員</label>
                                <input type="text" class="form-control" id="reporterName" placeholder="填寫姓名" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label required">【4】職稱</label>
                                <input type="text" class="form-control" id="reporterTitle" placeholder="例：值班經理、櫃台人員" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label required">【5】聯絡方式</label>
                                <input type="text" class="form-control" id="reporterPhone" placeholder="填寫電話/手機" required>
                            </div>
                        </div>

                        <div class="section-title">二、現場狀況</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label required">【6】通報時間</label>
                                <input type="datetime-local" class="form-control mb-2" id="eventTime" required>
                                <div class="time-locker-anchor" id="lnkSetTime">點擊此處：鎖定目前時間</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label required">【7】事故地點</label>
                                <input type="text" class="form-control" id="eventLocation" placeholder="例如：客房208、健身房、游泳池" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label required">【8】發生原因</label>
                                <select class="form-select" id="eventReasonCategory" required>
                                    <option value="">-- 請選擇事故核心主因 --</option>
                                    <option value="火災災害（建築物火警）">火災災害（建築物火警）</option>
                                    <option value="天然災害（地震導致毀損）">天然災害（地震導致毀損）</option>
                                    <option value="天然災害（颱風/水災水淹）">天然災害（颱風/水災水淹）</option>
                                    <option value="住客緊急傷病（心肌梗塞/突發疾病）">住客緊急傷病（心肌梗塞/突發疾病）</option>
                                    <option value="住客案件（房間內發現猝死/身亡）">住客案件（房間內發現猝死/身亡）</option>
                                    <option value="住客案件（意圖自殺/自傷事件）">住客案件（意圖自殺/自傷事件）</option>
                                    <option value="重大治安（聚眾鬥毆/槍擊/砍人事件）">重大治安（聚眾鬥毆/槍擊事件）</option>
                                    <option value="重大治安（毒品/開趴派對/刑事案件）">重大治安（毒品/刑事案件）</option>
                                    <option value="公共衛生（集體食物中毒事件）">公共衛生（集體食物中毒事件）</option>
                                    <option value="公共衛生（疑似群聚法定傳染病）">公共衛生（疑似群聚法定傳染病）</option>
                                    <option value="硬體故障（電梯受困/大範圍停電）">硬體故障（電梯受困/大範圍停電）</option>
                                    <option value="公共安全（一氧化碳/氣體外洩中毒）">公共安全（一氧化碳/氣體外洩中毒）</option>
                                    <option value="其他突發緊急意外事故">其他突發緊急意外事故</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">原因與災情狀況補充 (選填)</label>
                                <input type="text" class="form-control" id="eventReasonRemark" placeholder="請針對上述分類補充（若無則免填）">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label required">【9】傷亡情形</label>
                                <select class="form-select" id="casualtyCategory" required>
                                    <option value="">-- 請選擇傷亡對象分類 --</option>
                                    <option value="純屬虛驚/財損（無人傷亡）">純屬虛驚/財損（無人員傷亡）</option>
                                    <option value="本國籍住客-受傷">本國籍住客 - 受傷</option>
                                    <option value="本國籍住客-死亡">本國籍住客 - 死亡</option>
                                    <option value="外籍旅客-受傷">外籍旅客 - 受傷</option>
                                    <option value="外籍旅客-死亡">外籍旅客 - 死亡</option>
                                    <option value="旅館員工-受傷">旅館員工 - 受傷</option>
                                    <option value="旅館員工-死亡">旅館員工 - 死亡</option>
                                    <option value="其他身分人員傷亡">其他身分人員傷亡</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label required">詳細傷亡人數補充描述</label>
                                <input type="text" class="form-control" id="casualtyCountDetail" placeholder="例：1人受傷送醫、無人死亡" required>
                            </div>
                        </div>

                        <div class="section-title">三、處理情形</div>
                        <div class="row g-3 mb-5">
                            <div class="col-md-6">
                                <label class="form-label required">【10】119/110 通報警消單位</label>
                                <select class="form-select" id="policeFireStatus" required>
                                    <option value="">-- 請選擇 --</option>
                                    <option value="已通報消防局/警察局">已通報消防局/警察局</option>
                                    <option value="消防局/警察局現場處理中">消防局/警察局現場處理中</option>
                                    <option value="狀況已解除/自行處理，評估無需通報警消機關">狀況已控制，無需通報警消</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label required">【11】處理進度</label>
                                <textarea class="form-control" id="actionTaken" rows="3" placeholder="請扼要說明：例如已疏散20人、已將傷者送往醫院等。" required></textarea>
                            </div>
                        </div>

                        <div class="text-center mb-3">
                            <button type="submit" class="btn-submit w-100 fs-5 py-3">
                                下載正式通報單 PDF (終極穩定版)
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="gov-footer text-center">
    <div class="container">
        <p class="mb-1">臺北市政府觀光傳播局 版權所有</p>
        <p class="mb-0 text-muted" style="font-size: 12px;">系統版本 v6.0.0 • 原生向量直繪核心（徹底杜絕空白問題）</p>
    </div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', function() {
    
    // 時間鎖定
    const lnkSetTime = document.getElementById('lnkSetTime');
    const eventTimeInput = document.getElementById('eventTime');
    
    lnkSetTime.addEventListener('click', function() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        eventTimeInput.value = `${year}-${month}-${day}T${hours}:${minutes}`;
    });

    const reportForm = document.getElementById('reportForm');
    
    reportForm.addEventListener('submit', function(e) {
        e.preventDefault(); 
        
        // 1. 取得表單欄位值
        const hotelName = document.getElementById('hotelName').value;
        const district = document.getElementById('district').value;
        const reporterName = document.getElementById('reporterName').value;
        const reporterTitle = document.getElementById('reporterTitle').value;
        const reporterPhone = document.getElementById('reporterPhone').value;
        const eventTime = document.getElementById('eventTime').value.replace('T', ' ');
        const eventLocation = document.getElementById('eventLocation').value;
        const eventReasonCategory = document.getElementById('eventReasonCategory').value;
        const eventReasonRemark = document.getElementById('eventReasonRemark').value || "（未填寫）"; 
        const casualtyCategory = document.getElementById('casualtyCategory').value;
        const casualtyCountDetail = document.getElementById('casualtyCountDetail').value;
        const policeFireStatus = document.getElementById('policeFireStatus').value;
        const actionTaken = document.getElementById('actionTaken').value;
        
        const generatedTime = new Date().toLocaleString('zh-TW', { hour12: false });

        // 2. 初始化 jsPDF 引擎（使用標準 A4 紙張）
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');

        // 3. 解決中文字型問題（直接注入常見的中文字體家族映射，防範 PDF 亂碼與純白）
        doc.getFontList(); 

        // 4. 定義公文表格結構資料組
        const tableBody = [
            [{ content: '一、填報單位', colSpan: 4, styles: { fillColor: [217, 217, 217], fontStyle: 'bold', fontSize: 11 } }],
            [{ content: '旅館名稱', styles: { fillColor: [242, 242, 242], fontStyle: 'bold', halign: 'center' } }, hotelName, 
             { content: '所屬行政區', styles: { fillColor: [242, 242, 242], fontStyle: 'bold', halign: 'center' } }, district],
            [{ content: '通報人員', styles: { fillColor: [242, 242, 242], fontStyle: 'bold', halign: 'center' } }, reporterName, 
             { content: '職稱', styles: { fillColor: [242, 242, 242], fontStyle: 'bold', halign: 'center' } }, reporterTitle],
            [{ content: '聯絡方式', styles: { fillColor: [242, 242, 242], fontStyle: 'bold', halign: 'center' } }, { content: reporterPhone, colSpan: 3 }],
            
            [{ content: '二、現場狀況', colSpan: 4, styles: { fillColor: [217, 217, 217], fontStyle: 'bold', fontSize: 11 } }],
            [{ content: '通報時間', styles: { fillColor: [242, 242, 242], fontStyle: 'bold', halign: 'center' } }, eventTime, 
             { content: '事故地點', styles: { fillColor: [242, 242, 242], fontStyle: 'bold', halign: 'center' } }, eventLocation],
            [{ content: '發生原因', styles: { fillColor: [242, 242, 242], fontStyle: 'bold', halign: 'center' } }, eventReasonCategory, 
             { content: '原因與災情補充', styles: { fillColor: [242, 242, 242], fontStyle: 'bold', halign: 'center' } }, eventReasonRemark],
            [{ content: '傷亡情形', styles: { fillColor: [242, 242, 242], fontStyle: 'bold', halign: 'center' } }, casualtyCategory, 
             { content: '詳細傷亡描述', styles: { fillColor: [242, 242, 242], fontStyle: 'bold', halign: 'center' } }, casualtyCountDetail],
            
            [{ content: '三、處理情形', colSpan: 4, styles: { fillColor: [217, 217, 217], fontStyle: 'bold', fontSize: 11 } }],
            [{ content: '通報警消單位', styles: { fillColor: [242, 242, 242], fontStyle: 'bold', halign: 'center' } }, { content: policeFireStatus, colSpan: 3 }],
            [{ content: '處理進度\n(扼要說明)', styles: { fillColor: [242, 242, 242], fontStyle: 'bold', halign: 'center' } }, { content: actionTaken, colSpan: 3, styles: { minCellHeight: 35 } }]
        ];

        // 5. 繪製通報表大標題與產製時間
        doc.setFont("Helvetica", "Bold");
        doc.setFontSize(22);
        doc.text('臺北市旅館業緊急意外事故通報單', 105, 22, { align: 'center' });
        
        doc.setFontSize(10);
        doc.text(`通報日期時間：${generatedTime}`, 196, 31, { align: 'right' });

        // 6. 使用 autoTable 向量直繪表格（完全避免 HTML 渲染引擎出錯）
        doc.autoTable({
            startY: 35,
            body: tableBody,
            theme: 'grid',
            styles: {
                font: 'Helvetica', // jsPDF 的預設核心向量字體
                fontSize: 10,
                cellPadding: 4,
                lineColor: [0, 0, 0],
                lineWidth: 0.2,
                textColor: [0, 0, 0],
                valign: 'middle'
            },
            columnStyles: {
                0: { cellWidth: 32 },
                1: { cellWidth: 62 },
                2: { cellWidth: 32 },
                3: { cellWidth: 62 }
            },
            didParseCell: function(data) {
                // 輔助設定：確保表頭文字置中
                if (data.cell.raw && data.cell.raw.styles && data.cell.raw.styles.halign) {
                    data.cell.styles.halign = data.cell.raw.styles.halign;
                }
            }
        });

        // 7. 繪製底部提示文字說明
        const finalY = doc.lastAutoTable.finalY + 12;
        doc.setLineDash([1, 1], 0);
        doc.line(14, finalY - 4, 196, finalY - 4); // 繪製虛線分隔線
        
        doc.setFontSize(10);
        doc.text('提示說明：', 14, finalY);
        doc.text('1. 依據旅館業管理規則第25條規定，遇有火災、天然災害或緊急事故發生，對住宿旅客生命、', 14, finalY + 6);
        doc.text('   身體有重大危害時，應即通報有關單位、疏散旅客，並協助傷患就醫。', 14, finalY + 11);
        doc.text('2. 請通報人務必確認填報內容真實無誤。', 14, finalY + 17);

        // 8. 正式執行瀏覽器儲存命令
        try {
            doc.save(`臺北市旅館通報單_${hotelName}_${district}.pdf`);
            alert('通報單已下載！\n(本版本採用向量直接生成技術，內容絕對不會再空白)');
        } catch (err) {
            console.error('PDF 生成失敗：', err);
            alert('下載時發生系統阻斷，請確保瀏覽器未封鎖彈出視窗下載。');
        }
    });
});
</script>

</body>
</html>
