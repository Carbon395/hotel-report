<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北市旅館業緊急意外事故處理通報表 v12.0.0 (終極防亂碼大字版)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --gov-dark-blue: #1a365d;   
            --gov-orange: #e65100;      
            --text-main: #2d3748;       
        }
        body { 
            background-color: #f7fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif; 
            color: var(--text-main);
            padding: 20px 0; 
        }
        @media (min-width: 768px) { body { padding: 40px 0; } }
        .card { 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border: 1px solid rgba(26, 54, 93, 0.08);
            background-color: #ffffff;
        }
        .card-header { 
            background: linear-gradient(135deg, var(--gov-dark-blue), #2b6cb0); 
            color: white; padding: 24px 20px; border-bottom: none;
        }
        .section-title {
            color: var(--gov-dark-blue); font-weight: 700; border-left: 5px solid var(--gov-orange);
            padding-left: 12px; margin-top: 25px; margin-bottom: 20px; font-size: 18px;
        }
        .form-label { font-weight: 500; color: #4a5568; font-size: 15px; }
        .required::after { content: " *"; color: #e53e3e; font-weight: bold; }
        .form-control, .form-select { border-radius: 8px; border: 1px solid #cbd5e0; padding: 10px 14px; font-size: 15px; }
        
        .time-locker-anchor {
            display: block; text-align: center; background-color: #edf2f7; color: #2b6cb0;
            border: 1px dashed #4299e1; padding: 10px; border-radius: 8px;
            font-weight: bold; font-size: 15px; text-decoration: none; cursor: pointer; transition: all 0.15s;
        }
        .time-locker-anchor:hover { background-color: #4299e1; color: white; border-style: solid; }
        
        .btn-submit {
            background: linear-gradient(135deg, #dd6b20, var(--gov-orange)); color: white;
            border: none; border-radius: 8px; padding: 14px 40px; font-weight: 700;
            box-shadow: 0 4px 12px rgba(230, 81, 0, 0.2); transition: all 0.2s;
        }
        .btn-submit:hover { background: linear-gradient(135deg, var(--gov-orange), #c05621); }
        .gov-footer { background-color: #2d3748; color: #a0aec0; padding: 24px 0; font-size: 13px; margin-top: 60px; border-top: 4px solid var(--gov-orange); }
        
        /* 隱藏真正用來產製 PDF 的高畫質模板（不影響前台視覺排版） */
        #pdf-template-wrapper {
            position: absolute;
            left: -9999px;
            top: -9999px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card">
                <div class="card-header text-center">
                    <h3 class="mb-1 fw-bold">臺北市旅館業緊急意外事故處理通報表</h3>
                    <small>臺北市政府觀光傳播局</small>
                </div>
                <div class="card-body p-4 px-md-5">
                    <form id="reportForm">
                        
                        <div class="section-title">一、填報單位</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label required">【1】填報單位</label>
                                <input type="text" class="form-control" id="hotelName" placeholder="請輸入旅館名稱" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label required">【2】所屬行政區</label>
                                <select class="form-select" id="district" required>
                                    <option value="">-- 請選擇專責行政區 --</option>
                                    <option value="中正區">中正區</option>
                                    <option value="信義區">信義區</option>
                                    <option value="大安區">大安區</option>
                                    <option value="北投區">北投區</option>
                                    <option value="大同區">大同區</option>
                                    <option value="萬華區">萬華區</option>
                                    <option value="中山區">中山區</option>
                                    <option value="松山區">松山區</option>
                                    <option value="南港區">南港區</option>
                                    <option value="內湖區">內湖區</option>
                                    <option value="文山區">文山區</option>
                                    <option value="士林區">士林區</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label required">【3】通報人員</label>
                                <input type="text" class="form-control" id="reporterName" placeholder="填寫姓名" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label required">【4】職稱</label>
                                <input type="text" class="form-control" id="reporterTitle" placeholder="例：值班經理、櫃台主管" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label required">【5】聯絡方式</label>
                                <input type="text" class="form-control" id="reporterPhone" placeholder="填寫電話/手機分機" required>
                            </div>
                        </div>

                        <div class="section-title">二、現場狀況</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label required">【6】通報時間</label>
                                <input type="datetime-local" class="form-control mb-2" id="eventTime" required>
                                <div class="time-locker-anchor" id="lnkSetTime">點擊此處：鎖定目前時間</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label required">【7】事故地點</label>
                                <input type="text" class="form-control" id="eventLocation" placeholder="例如：客房305、餐廳" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label required">【8】發生原因</label>
                                <select class="form-select" id="eventReasonCategory" required>
                                    <option value="">-- 請選擇事故核心原因 --</option>
                                    <option value="住客案件（自殺/自傷）">住客案件（自殺/自傷）</option>
                                    <option value="住客案件（房內意外傷亡）">住客案件（房內意外傷亡）</option>
                                    <option value="火災災害（建築物火警）">火災災害（建築物火警）</option>
                                    <option value="治安案件（暴力/槍擊/傷害）">重大治安（暴力/槍擊/傷害）</option>
                                    <option value="治安案件（毒品）">重大治安（毒品）</option>
                                    <option value="公共衛生（傳染病）">公共衛生（傳染病）</option>
                                    <option value="公共衛生（食物中毒）">公共衛生（食物中毒）</option>
                                    <option value="公共安全（氣體中毒）">公共安全（氣體中毒）</option>
                                    <option value="天然災害（地震）">天然災害（地震）</option>
                                    <option value="天然災害（水/風災）">天然災害（水/風災）</option>
                                    <option value="其他突發緊急意外事故">其他突發緊急意外事故</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">原因與災情狀況補充描述 (無免填)</label>
                                <input type="text" class="form-control" id="eventReasonRemark" placeholder="補充說明">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label required">【9】傷亡情形</label>
                                <select class="form-select" id="casualtyCategory" required>
                                    <option value="">-- 請選擇傷亡對象分類 --</option>
                                    <option value="純屬虛驚/財損（無人員傷亡）">純屬虛驚/財損（無人員傷亡）</option>
                                    <option value="本國籍住客 - 受傷">本國籍住客 - 受傷</option>
                                    <option value="本國籍住客 - 死亡">本國籍住客 - 死亡</option>
                                    <option value="外籍旅客 - 受傷">外籍旅客 - 受傷</option>
                                    <option value="外籍旅客 - 死亡">外籍旅客 - 死亡</option>
                                    <option value="旅館員工 - 受傷">旅館員工 - 受傷</option>
                                    <option value="旅館員工 - 死亡">旅館員工 - 死亡</option>
                                    <option value="其他身分人員傷亡">其他身分人員傷亡</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label required">傷亡人數補充</label>
                                <input type="text" class="form-control" id="casualtyCountDetail" placeholder="例：無人傷亡 / 1人送醫救治" required>
                            </div>
                        </div>

                        <div class="section-title">三、處理情形</div>
                        <div class="row g-3 mb-5">
                            <div class="col-md-6">
                                <label class="form-label required">【10】119/110 通報單位</label>
                                <select class="form-select" id="policeFireStatus" required>
                                    <option value="">-- 請選擇 --</option>
                                    <option value="已通報消防局/警察局/醫療救護">已通報消防局/警察局/醫療救護</option>
                                    <option value="警消醫護人員現場處理中">警消醫護人員現場處理中</option>
                                    <option value="狀況解除/自行處置完成，評估無需通報警消醫護">狀況控制，評估無需通報警消醫護</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label required">【11】處理進度</label>
                                <textarea class="form-control" id="actionTaken" rows="3" placeholder="請簡要說明：例如配合警方調查、疏散旅客等。" required></textarea>
                            </div>
                        </div>

                        <div class="text-center mb-3">
                            <button type="submit" class="btn-submit w-100 fs-4 py-3">
                                🚀 產製通報單
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="pdf-template-wrapper">
    <div id="pdf-content-node" style="width: 794px; background: #ffffff; padding: 40px; box-sizing: border-box;">
        </div>
</div>

<footer class="gov-footer text-center">
    <div class="container">
        <p class="mb-1">臺北市政府觀光傳播局 版權所有</p>
        <p class="mb-0 text-muted" style="font-size: 12px;">系統版本 v12.0.0 • 引入 Canvas 點陣影像防空防亂碼機制</p>
    </div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', function() {
    
    // 時間鎖定
    const lnkSetTime = document.getElementById('lnkSetTime');
    const eventTimeInput = document.getElementById('eventTime');
    lnkSetTime.addEventListener('click', function() {
        const now = new Date();
        eventTimeInput.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}T${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    });

    const reportForm = document.getElementById('reportForm');
    reportForm.addEventListener('submit', function(e) {
        e.preventDefault(); 
        
        const hotelName = document.getElementById('hotelName').value;
        const district = document.getElementById('district').value;
        const reporterName = document.getElementById('reporterName').value;
        const reporterTitle = document.getElementById('reporterTitle').value;
        const reporterPhone = document.getElementById('reporterPhone').value;
        const eventTime = document.getElementById('eventTime').value.replace('T', ' ');
        const eventLocation = document.getElementById('eventLocation').value;
        const eventReasonCategory = document.getElementById('eventReasonCategory').value;
        const eventReasonRemark = document.getElementById('eventReasonRemark').value || "（無）"; 
        const casualtyCategory = document.getElementById('casualtyCategory').value;
        const casualtyCountDetail = document.getElementById('casualtyCountDetail').value;
        const policeFireStatus = document.getElementById('policeFireStatus').value;
        const actionTaken = document.getElementById('actionTaken').value;
        const generatedTime = new Date().toLocaleString('zh-TW', { hour12: false });

        // 注入高畫質、超大字體、強表格格線的 HTML 結構中
        const contentNode = document.getElementById('pdf-content-node');
        contentNode.innerHTML = `
            <div style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #000000; background: #ffffff;">
                <div style="text-align: center; font-size: 34px; font-weight: 900; margin-bottom: 8px; letter-spacing: 1px; color: #000000;">臺北市旅館業緊急意外事故通報單</div>
                <div style="text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 40px; letter-spacing: 3px; color: #000000;">臺北市政府觀光傳播局</div>
                <div style="text-align: right; font-size: 16px; margin-bottom: 15px; font-weight: bold; color: #000000;">通報日期時間：${generatedTime}</div>

                <table style="width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 30px; border: 3px solid #000000; background: #ffffff;">
                    <tr>
                        <th colspan="4" style="border: 3px solid #000000; padding: 16px; background-color: #cccccc; text-align: left; font-size: 24px; font-weight: 900; color: #000000;">一、填報單位</th>
                    </tr>
                    <tr>
                        <th style="border: 3px solid #000000; padding: 18px 10px; background-color: #f2f2f2; text-align: center; width: 22%; font-size: 21px; font-weight: bold; color: #000000;">旅館名稱</th>
                        <td style="border: 3px solid #000000; padding: 18px 12px; width: 28%; font-size: 21px; color: #000000; font-weight: 500;">${hotelName}</td>
                        <th style="border: 3px solid #000000; padding: 18px 10px; background-color: #f2f2f2; text-align: center; width: 22%; font-size: 21px; font-weight: bold; color: #000000;">所屬行政區</th>
                        <td style="border: 3px solid #000000; padding: 18px 12px; width: 28%; font-size: 21px; color: #000000; font-weight: 500;">${district}</td>
                    </tr>
                    <tr>
                        <th style="border: 3px solid #000000; padding: 18px 10px; background-color: #f2f2f2; text-align: center; font-size: 21px; font-weight: bold; color: #000000;">通報人員</th>
                        <td style="border: 3px solid #000000; padding: 18px 12px; font-size: 21px; color: #000000; font-weight: 500;">${reporterName}</td>
                        <th style="border: 3px solid #000000; padding: 18px 10px; background-color: #f2f2f2; text-align: center; font-size: 21px; font-weight: bold; color: #000000;">職稱</th>
                        <td style="border: 3px solid #000000; padding: 18px 12px; font-size: 21px; color: #000000; font-weight: 500;">${reporterTitle}</td>
                    </tr>
                    <tr>
                        <th style="border: 3px solid #000000; padding: 18px 10px; background-color: #f2f2f2; text-align: center; font-size: 21px; font-weight: bold; color: #000000;">聯絡方式</th>
                        <td colspan="3" style="border: 3px solid #000000; padding: 18px 12px; font-size: 21px; color: #000000; font-weight: 500;">${reporterPhone}</td>
                    </tr>
                    
                    <tr>
                        <th colspan="4" style="border: 3px solid #000000; padding: 16px; background-color: #cccccc; text-align: left; font-size: 24px; font-weight: 900; color: #000000;">二、現場狀況</th>
                    </tr>
                    <tr>
                        <th style="border: 3px solid #000000; padding: 18px 10px; background-color: #f2f2f2; text-align: center; font-size: 21px; font-weight: bold; color: #000000;">通報時間</th>
                        <td style="border: 3px solid #000000; padding: 18px 12px; font-size: 21px; color: #000000; font-weight: 500;">${eventTime}</td>
                        <th style="border: 3px solid #000000; padding: 18px 10px; background-color: #f2f2f2; text-align: center; font-size: 21px; font-weight: bold; color: #000000;">事故地點</th>
                        <td style="border: 3px solid #000000; padding: 18px 12px; font-size: 21px; color: #000000; font-weight: 500;">${eventLocation}</td>
                    </tr>
                    <tr>
                        <th style="border: 3px solid #000000; padding: 18px 10px; background-color: #f2f2f2; text-align: center; font-size: 21px; font-weight: bold; color: #000000;">發生原因</th>
                        <td style="border: 3px solid #000000; padding: 18px 12px; font-size: 21px; color: #000000; font-weight: 500;">${eventReasonCategory}</td>
                        <th style="border: 3px solid #000000; padding: 18px 10px; background-color: #f2f2f2; text-align: center; font-size: 21px; font-weight: bold; color: #000000;">原因與災情補充</th>
                        <td style="border: 3px solid #000000; padding: 18px 12px; font-size: 21px; color: #000000; font-weight: 500;">${eventReasonRemark}</td>
                    </tr>
                    <tr>
                        <th style="border: 3px solid #000000; padding: 18px 10px; background-color: #f2f2f2; text-align: center; font-size: 21px; font-weight: bold; color: #000000;">傷亡情形</th>
                        <td style="border: 3px solid #000000; padding: 18px 12px; font-size: 21px; color: #000000; font-weight: 500;">${casualtyCategory}</td>
                        <th style="border: 3px solid #000000; padding: 18px 10px; background-color: #f2f2f2; text-align: center; font-size: 21px; font-weight: bold; color: #000000;">詳細傷亡描述</th>
                        <td style="border: 3px solid #000000; padding: 18px 12px; font-size: 21px; color: #000000; font-weight: 500;">${casualtyCountDetail}</td>
                    </tr>
                    
                    <tr>
                        <th colspan="4" style="border: 3px solid #000000; padding: 16px; background-color: #cccccc; text-align: left; font-size: 24px; font-weight: 900; color: #000000;">三、處理情形</th>
                    </tr>
                    <tr>
                        <th style="border: 3px solid #000000; padding: 18px 10px; background-color: #f2f2f2; text-align: center; font-size: 21px; font-weight: bold; color: #000000;">通報警消單位</th>
                        <td colspan="3" style="border: 3px solid #000000; padding: 18px 12px; font-size: 21px; color: #000000; font-weight: 500;">${policeFireStatus}</td>
                    </tr>
                    <tr>
                        <th style="border: 3px solid #000000; padding: 18px 10px; background-color: #f2f2f2; text-align: center; font-size: 21px; font-weight: bold; color: #000000;">處理進度<br>(簡要說明)</th>
                        <td colspan="3" style="border: 3px solid #000000; padding: 20px 15px; height: 260px; vertical-align: top; font-size: 22px; line-height: 1.8; color: #000000; font-weight: 500;">${actionTaken.replace(/\n/g, '<br>')}</td>
                    </tr>
                </table>

                <div style="font-size: 17px; margin-top: 50px; border-top: 2px dashed #000000; padding-top: 20px; line-height: 1.8; color: #333333;">
                    <strong>提示說明：</strong><br>
                    1. 依旅館業管理規則第25條，遇有火災、天然災害或緊急事故發生，對住宿旅客生命、身體有重大危害時，旅館應即通報有關單位、疏散旅客，並協助傷患就醫。<br>
                    2. 請通報人務必確認填報內容真實無誤。
                </div>
            </div>
        `;

        // ==========================================================================
        // 🚀 核心黑科技配置：強制利用 html2canvas 將內容轉為高解析度無損點陣圖，再包入 PDF
        //    這能確保在 PDF 內 100% 呈現文字與線條，徹底免除亂碼與空白！
        // ==========================================================================
        const opt = {
            margin:       [10, 10, 10, 10], // 上下左右邊距
            filename:     `臺北市旅館通報單_${hotelName}_${district}.pdf`,
            image:        { type: 'jpeg', quality: 1.0 }, // 使用 100% 高品質點陣封裝
            html2canvas:  { 
                scale: 3.0,            // 放大 3 倍渲染，確保字體邊緣極度銳利，無顆粒感
                useCORS: true, 
                backgroundColor: '#ffffff',
                logging: false,
                removeContainer: true
            },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // 執行無損轉譯並觸發安全下載
        html2pdf().set(opt).from(contentNode).save().then(() => {
            alert('通報單已下載！');
        }).catch(err => {
            console.error('PDF產製失敗:', err);
            alert('系統忙碌中，請重新點擊一次。');
        });
    });
});
</script>

</body>
</html>
