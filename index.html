<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北市旅館緊急意外事故處理通報表</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --gov-dark-blue: #1a365d;   
            --gov-orange: #e65100;      
            --text-main: #2d3748;       
        }
        body { 
            background-color: #f7fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif; 
            color: var(--text-main);
            padding: 20px 0; 
        }
        @media (min-width: 768px) { body { padding: 40px 0; } }
        .card { 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border: 1px solid rgba(26, 54, 93, 0.08);
            background-color: #ffffff;
        }
        .card-header { 
            background: linear-gradient(135deg, var(--gov-dark-blue), #2b6cb0); 
            color: white; padding: 24px 20px; border-bottom: none;
        }
        .section-title {
            color: var(--gov-dark-blue); font-weight: 700; border-left: 5px solid var(--gov-orange);
            padding-left: 12px; margin-top: 25px; margin-bottom: 20px; font-size: 18px;
        }
        .form-label { font-weight: 500; color: #4a5568; font-size: 15px; }
        .required::after { content: " *"; color: #e53e3e; font-weight: bold; }
        .form-control, .form-select { border-radius: 8px; border: 1px solid #cbd5e0; padding: 10px 14px; font-size: 15px; }
        
        .time-locker-anchor {
            display: block; text-align: center; background-color: #edf2f7; color: #2b6cb0;
            border: 1px dashed #4299e1; padding: 10px; border-radius: 8px;
            font-weight: bold; font-size: 15px; text-decoration: none; cursor: pointer; transition: all 0.15s;
        }
        .time-locker-anchor:hover { background-color: #4299e1; color: white; border-style: solid; }
        
        .btn-submit {
            background: linear-gradient(135deg, #dd6b20, var(--gov-orange)); color: white;
            border: none; border-radius: 8px; padding: 14px 40px; font-weight: 700;
            box-shadow: 0 4px 12px rgba(230, 81, 0, 0.2); transition: all 0.2s;
        }
        .btn-submit:hover { background: linear-gradient(135deg, var(--gov-orange), #c05621); }
        .gov-footer { background-color: #2d3748; color: #a0aec0; padding: 24px 0; font-size: 13px; margin-top: 60px; border-top: 4px solid var(--gov-orange); }

        /* 🚀 隱藏預覽專用的區塊，平常不顯示 */
        #printTemplate { display: none; }

        /* ==========================================================================
           ⚡ 終極救星：列印樣式覆寫 (當使用者點擊列印另存 PDF 時，強制切換排版)
           ========================================================================== */
        @media print {
            /* 1. 隱藏原本畫面上複雜的 UI、表單、頁尾 */
            body { background: #ffffff !important; padding: 0 !important; margin: 0 !important; }
            .container, footer, .card, #reportForm { display: none !important; }
            
            /* 2. 讓隱藏的標準公務表格現形 */
            #printTemplate { display: block !important; }
            
            /* 3. 強制瀏覽器不要幫我們加預設頁首頁尾（消除網址與日期） */
            @page { margin: 1.5cm; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card">
                <div class="card-header text-center">
                    <h3 class="mb-1 fw-bold">臺北市旅館緊急意外事故處理通報表</h3>
                    <small>建議使用Chrome瀏覽器開啟填寫</small>
                </div>
                <div class="card-body p-4 px-md-5">
                    <form id="reportForm">
                        
                        <div class="section-title">一、填報單位</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label required">【1】填報單位</label>
                                <input type="text" class="form-control" id="hotelName" placeholder="請輸入旅館名稱" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label required">【2】所屬行政區</label>
                                <select class="form-select" id="district" required>
                                    <option value="">-- 請選擇專責行政區 --</option>
                                    <option value="中正區">中正區</option>
                                    <option value="信義區">信義區</option>
                                    <option value="大安區">大安區</option>
                                    <option value="北投區">北投區</option>
                                    <option value="大同區">大同區</option>
                                    <option value="萬華區">萬華區</option>
                                    <option value="中山區">中山區</option>
                                    <option value="松山區">松山區</option>
                                    <option value="南港區">南港區</option>
                                    <option value="內湖區">內湖區</option>
                                    <option value="文山區">文山區</option>
                                    <option value="士林區">士林區</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label required">【3】通報人員</label>
                                <input type="text" class="form-control" id="reporterName" placeholder="填寫姓名" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label required">【4】職稱</label>
                                <input type="text" class="form-control" id="reporterTitle" placeholder="例：值班經理、櫃台主管" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label required">【5】聯絡方式</label>
                                <input type="text" class="form-control" id="reporterPhone" placeholder="填寫電話/手機分機" required>
                            </div>
                        </div>

                        <div class="section-title">二、現場狀況</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label required">【6】通報時間</label>
                                <input type="datetime-local" class="form-control mb-2" id="eventTime" required>
                                <div class="time-locker-anchor" id="lnkSetTime">點擊此處：鎖定目前時間</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label required">【7】事故地點</label>
                                <input type="text" class="form-control" id="eventLocation" placeholder="例如：客房208、餐廳" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label required">【8】發生原因</label>
                                <select class="form-select" id="eventReasonCategory" required>
                                    <option value="">-- 請選擇事故核心原因 --</option>
                                    <option value="住客案件(自殺/自傷)">住客案件(自殺/自傷)</option>
                                    <option value="住客案件(房內意外傷亡)">住客案件(房內意外傷亡)</option>
                                    <option value="火災災害(建築物火警)">火災災害(建築物火警)</option>
                                    <option value="重大治安(暴力/槍擊/傷害)">重大治安(暴力/槍擊/傷害)</option>
                                    <option value="重大治安(毒品)">重大治安(毒品)</option>
                                    <option value="公共衛生(傳染病)">公共衛生(傳染病)</option>
                                    <option value="公共安生(食物中毒)">公共安全(食物中毒)</option>
                                    <option value="公共安全(氣體中毒)">公共安全(氣體中毒)</option>
                                    <option value="天然災害(地震)">天然災害(地震)</option>
                                    <option value="天然災害(水/風災)">天然災害(水/風災)</option>
                                    <option value="其他突發緊急意外事故">其他突發緊急意外事故</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">事故原因補充</label>
                                <input type="text" class="form-control" id="eventReasonRemark" placeholder="補充說明">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label required">【9】傷亡情形</label>
                                <select class="form-select" id="casualtyCategory" required>
                                    <option value="">-- 請選擇傷亡對象分類 --</option>
                                    <option value="純屬虛驚/財損(無人員傷亡)">純屬虛驚/財損(無人員傷亡)</option>
                                    <option value="本國籍住客 - 受傷">本國籍住客 - 受傷</option>
                                    <option value="本國籍住客 - 死亡">本國籍住客 - 死亡</option>
                                    <option value="外國籍住客 - 受傷">外國籍住客 - 受傷</option>
                                    <option value="外國籍住客 - 死亡">外國籍住客 - 死亡</option>
                                    <option value="旅館員工 - 受傷">旅館員工 - 受傷</option>
                                    <option value="旅館員工 - 死亡">旅館員工 - 死亡</option>
                                    <option value="其他身分人員傷亡">其他身分人員傷亡</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label required">傷亡補充說明</label>
                                <input type="text" class="form-control" id="casualtyCountDetail" placeholder="例：1人死亡 / 1人送醫救治" required>
                            </div>
                        </div>

                        <div class="section-title">三、處理情形</div>
                        <div class="row g-3 mb-5">
                            <div class="col-md-6">
                                <label class="form-label required">【10】通報警消單位</label>
                                <select class="form-select" id="policeFireStatus" required>
                                    <option value="">-- 請選擇 --</option>
                                    <option value="已通報消防局/警察局/醫療救護單位處理中">已通報消防局/警察局/醫療救護</option>
                                    <option value="警消醫護人員現場處理中">警消醫護人員現場處理中</option>
                                    <option value="狀況解除/自行處置完成，評估無需通報警消醫護">狀況解除/自行處置完成，評估無需通報警消醫護</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label required">【11】處理進度 </label>
                                <textarea class="form-control" id="actionTaken" rows="3" placeholder="請簡要說明現場處理進度。" required></textarea>
                            </div>
                        </div>

                        <div class="text-center mb-3">
                            <button type="submit" class="btn-submit w-100 fs-4 py-3">
                                產製通報單
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="gov-footer text-center">
    <div class="container">
        <p class="mb-1">臺北市政府觀光傳播局 版權所有</p>
    </div>
</footer>

<div id="printTemplate"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    
    // 鎖定目前時間功能
    const lnkSetTime = document.getElementById('lnkSetTime');
    const eventTimeInput = document.getElementById('eventTime');
    if(lnkSetTime) {
        lnkSetTime.addEventListener('click', function() {
            const now = new Date();
            eventTimeInput.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}T${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        });
    }

    // 表單送出
    const reportForm = document.getElementById('reportForm');
    reportForm.addEventListener('submit', function(e) {
        e.preventDefault(); 
        
        // 抓取表單資料
        const hotelName = document.getElementById('hotelName').value;
        const district = document.getElementById('district').value;
        const reporterName = document.getElementById('reporterName').value;
        const reporterTitle = document.getElementById('reporterTitle').value;
        const reporterPhone = document.getElementById('reporterPhone').value;
        const eventTime = document.getElementById('eventTime').value.replace('T', ' ');
        const eventLocation = document.getElementById('eventLocation').value;
        const eventReasonCategory = document.getElementById('eventReasonCategory').value;
        const eventReasonRemark = document.getElementById('eventReasonRemark').value || "（無）"; 
        const casualtyCategory = document.getElementById('casualtyCategory').value;
        const casualtyCountDetail = document.getElementById('casualtyCountDetail').value;
        const policeFireStatus = document.getElementById('policeFireStatus').value;
        const actionTaken = document.getElementById('actionTaken').value;
        
        const now = new Date();
        const generatedTime = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

        // 填寫到列印模板內
        const printTemplate = document.getElementById('printTemplate');
        printTemplate.innerHTML = `
            <div style="font-family: 'Noto Sans TC', Arial, sans-serif; color: #000000; background: #ffffff; width: 100%; max-width: 680px; margin: 0 auto; line-height: 1.5;">
                <div style="text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 5px; color: #1a365d; letter-spacing: 1px;">臺北市旅館緊急意外事故通報單</div>
                <div style="text-align: center; font-size: 14px; font-weight: bold; margin-bottom: 20px; color: #4a5568; letter-spacing: 2px;">臺北市政府觀光傳播局</div>
                <div style="text-align: right; font-size: 12px; margin-bottom: 5px; font-weight: bold; color: #000000;">通報日期時間: ${generatedTime}</div>

                <table style="width: 100%; border-collapse: collapse; table-layout: fixed; border: 2px solid #000000; background: #ffffff;">
                    <tr>
                        <td colspan="4" style="border: 1.5px solid #000000; padding: 10px; background-color: #f2f2f2; text-align: left; font-size: 14px; font-weight: bold; color: #000000;">一、填報單位</td>
                    </tr>
                    <tr>
                        <td style="border: 1.5px solid #000000; padding: 10px; background-color: #fafafa; text-align: center; width: 20%; font-size: 13px; font-weight: bold;">旅館名稱</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; width: 30%; font-size: 13px; word-wrap: break-word; overflow-wrap: break-word;">${hotelName}</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; background-color: #fafafa; text-align: center; width: 20%; font-size: 13px; font-weight: bold;">所屬行政區</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; width: 30%; font-size: 13px;">${district}</td>
                    </tr>
                    <tr>
                        <td style="border: 1.5px solid #000000; padding: 10px; background-color: #fafafa; text-align: center; font-size: 13px; font-weight: bold;">通報人員</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; font-size: 13px; word-wrap: break-word; overflow-wrap: break-word;">${reporterName}</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; background-color: #fafafa; text-align: center; font-size: 13px; font-weight: bold;">職稱</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; font-size: 13px; word-wrap: break-word; overflow-wrap: break-word;">${reporterTitle}</td>
                    </tr>
                    <tr>
                        <td style="border: 1.5px solid #000000; padding: 10px; background-color: #fafafa; text-align: center; font-size: 13px; font-weight: bold;">聯絡方式</td>
                        <td colspan="3" style="border: 1.5px solid #000000; padding: 10px; font-size: 13px; word-wrap: break-word; overflow-wrap: break-word;">${reporterPhone}</td>
                    </tr>
                    
                    <tr>
                        <td colspan="4" style="border: 1.5px solid #000000; padding: 10px; background-color: #f2f2f2; text-align: left; font-size: 14px; font-weight: bold; color: #000000;">二、現場狀況</td>
                    </tr>
                    <tr>
                        <td style="border: 1.5px solid #000000; padding: 10px; background-color: #fafafa; text-align: center; font-size: 13px; font-weight: bold;">通報時間</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; font-size: 13px;">${eventTime}</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; background-color: #fafafa; text-align: center; font-size: 13px; font-weight: bold;">事故地點</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; font-size: 13px; word-wrap: break-word; overflow-wrap: break-word;">${eventLocation}</td>
                    </tr>
                    <tr>
                        <td style="border: 1.5px solid #000000; padding: 10px; background-color: #fafafa; text-align: center; font-size: 13px; font-weight: bold;">發生原因</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; font-size: 13px;">${eventReasonCategory}</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; background-color: #fafafa; text-align: center; font-size: 13px; font-weight: bold;">原因補充說明</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; font-size: 13px; word-wrap: break-word; overflow-wrap: break-word;">${eventReasonRemark}</td>
                    </tr>
                    <tr>
                        <td style="border: 1.5px solid #000000; padding: 10px; background-color: #fafafa; text-align: center; font-size: 13px; font-weight: bold;">傷亡情形</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; font-size: 13px;">${casualtyCategory}</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; background-color: #fafafa; text-align: center; font-size: 13px; font-weight: bold;">傷亡補充說明</td>
                        <td style="border: 1.5px solid #000000; padding: 10px; font-size: 13px; word-wrap: break-word; overflow-wrap: break-word;">${casualtyCountDetail}</td>
                    </tr>
                    
                    <tr>
                        <td colspan="4" style="border: 1.5px solid #000000; padding: 10px; background-color: #f2f2f2; text-align: left; font-size: 14px; font-weight: bold; color: #000000;">三、處理情形</td>
                    </tr>
                    <tr>
                        <td style="border: 1.5px solid #000000; padding: 10px; background-color: #fafafa; text-align: center; font-size: 13px; font-weight: bold;">通報警消單位</td>
                        <td colspan="3" style="border: 1.5px solid #000000; padding: 10px; font-size: 13px;">${policeFireStatus}</td>
                    </tr>
                    <tr>
                        <td style="border: 1.5px solid #000000; padding: 10px; background-color: #fafafa; text-align: center; font-size: 13px; font-weight: bold;">處理進度<br>(簡要說明)</td>
                        <td colspan="3" style="border: 1.5px solid #000000; padding: 12px; height: 220px; vertical-align: top; font-size: 13px; line-height: 1.6; color: #000000; word-wrap: break-word; white-space: pre-wrap;">${actionTaken}</td>
                    </tr>
                </table>

                <div style="font-size: 11px; margin-top: 20px; border-top: 1px dashed #cbd5e0; padding-top: 10px; line-height: 1.5; color: #4a5568;">
                    <strong>提示說明：</strong><br>
                    1. 依旅館業管理規則第25條，遇有火災、天然災害或緊急事故發生，對住宿旅客生命、身體有重大危害時，旅館應即通報有關單位、疏散旅客，並協助傷患就醫。<br>
                    2. 通報人員務必確認填報內容真實無誤，並將通報單提供臺北市政府觀光傳播局。
                </div>
            </div>
        `;

        // ⚡ 直接呼叫系統列印（此時 CSS @media print 觸發，畫面自動只剩下完美表格）
        window.print();
    });
});
</script>

</body>
</html>
